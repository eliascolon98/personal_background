<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultas Colombia</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { width:100%; max-width:580px; }
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
      animation: fadeInUp 0.6s ease;
    }
    @keyframes fadeInUp { from{opacity:0;transform:translateY(30px);}to{opacity:1;transform:translateY(0);} }

    .card-header { text-align:center; margin-bottom:28px; }
    .card-header .icon { width:64px;height:64px;background:linear-gradient(135deg,#667eea,#764ba2);border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;font-size:28px; }
    .card-header h1 { color:#fff;font-size:20px;font-weight:600; }
    .card-header p  { color:rgba(255,255,255,0.5);font-size:13px;margin-top:4px; }

    /* Tabs */
    .tabs { display:flex;gap:6px;margin-bottom:24px; }
    .tab {
      flex:1;padding:10px 4px;border-radius:12px;border:1px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.6);text-align:center;
      cursor:pointer;transition:all 0.3s;font-size:12px;font-weight:500;line-height:1.3;
    }
    .tab:hover { background:rgba(255,255,255,0.1); }
    .tab.active { background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;border-color:transparent; }

    /* Form inputs */
    .input-group { position:relative;margin-bottom:16px; }
    .input-group label { display:block;color:rgba(255,255,255,0.7);font-size:12px;margin-bottom:6px;font-weight:500; }
    .input-group input {
      width:100%;padding:14px 16px;background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15);border-radius:10px;
      color:#fff;font-size:15px;transition:all 0.3s;outline:none;
    }
    .input-group input:focus { border-color:#667eea;background:rgba(255,255,255,0.12);box-shadow:0 0 0 3px rgba(102,126,234,0.2); }
    .input-group input::placeholder { color:rgba(255,255,255,0.3); }

    .btn {
      width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);
      border:none;border-radius:12px;color:#fff;font-size:15px;font-weight:600;
      cursor:pointer;transition:all 0.3s;margin-top:8px;
    }
    .btn:hover:not(:disabled) { transform:translateY(-2px);box-shadow:0 10px 30px rgba(102,126,234,0.4); }
    .btn:disabled { opacity:0.6;cursor:not-allowed; }

    /* Progress */
    .progress-section { display:none;margin-top:28px; }
    .progress-section.active { display:block;animation:fadeInUp 0.4s ease; }
    .progress-bar-container { width:100%;height:4px;background:rgba(255,255,255,0.1);border-radius:4px;margin-bottom:20px;overflow:hidden; }
    .progress-bar { height:100%;background:linear-gradient(90deg,#667eea,#764ba2,#667eea);background-size:200% 100%;border-radius:4px;width:0%;transition:width 0.8s ease;animation:shimmer 2s infinite linear; }
    @keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
    .steps { list-style:none; }
    .step { display:flex;align-items:center;gap:10px;padding:8px 0;opacity:0.3;transition:all 0.4s; }
    .step.active { opacity:1; }
    .step.completed { opacity:0.6; }
    .step-icon { width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);transition:all 0.4s; }
    .step.active .step-icon { background:rgba(102,126,234,0.3);border-color:#667eea;animation:pulse 1.5s infinite; }
    .step.completed .step-icon { background:rgba(72,187,120,0.3);border-color:#48bb78; }
    @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(102,126,234,0.4);}50%{box-shadow:0 0 0 6px rgba(102,126,234,0);}}
    .step-text { color:rgba(255,255,255,0.7);font-size:13px; }
    .step.active .step-text { color:#fff;font-weight:500; }

    /* Result */
    .result-section { display:none;margin-top:28px; }
    .result-section.active { display:block;animation:fadeInUp 0.5s ease; }
    .result-card { padding:20px;border-radius:16px;text-align:center; }
    .result-card.success { background:rgba(72,187,120,0.1);border:1px solid rgba(72,187,120,0.3); }
    .result-card.danger  { background:rgba(245,101,101,0.1);border:1px solid rgba(245,101,101,0.3); }
    .result-card.error   { background:rgba(237,137,54,0.1);border:1px solid rgba(237,137,54,0.3); }
    .result-icon  { font-size:40px;margin-bottom:10px;animation:bounceIn 0.6s ease; }
    .result-title { color:#fff;font-size:16px;font-weight:600;margin-bottom:6px; }
    .result-msg   { color:rgba(255,255,255,0.7);font-size:13px;line-height:1.5; }
    @keyframes bounceIn{0%{transform:scale(0);}50%{transform:scale(1.2);}100%{transform:scale(1);}}

    /* Detail rows (antecedentes) */
    .detail-list { margin-top:14px;padding-top:14px;border-top:1px solid rgba(255,255,255,0.1);text-align:left; }
    .d-row { display:flex;justify-content:space-between;padding:5px 0;font-size:12px;gap:8px; }
    .d-row .lbl { color:rgba(255,255,255,0.5);flex-shrink:0; }
    .d-row .val { color:rgba(255,255,255,0.9);font-weight:500;text-align:right; }

    /* Accordion (vehiculo) */
    .accordion { margin-top:14px;text-align:left; }
    .accordion-item { background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:12px;margin-bottom:10px;overflow:hidden; }
    .accordion-item summary { padding:13px 16px;cursor:pointer;color:#fff;font-size:13px;font-weight:600;list-style:none;display:flex;align-items:center;justify-content:space-between;user-select:none;transition:background 0.2s; }
    .accordion-item summary:hover { background:rgba(255,255,255,0.06); }
    .accordion-item summary::-webkit-details-marker { display:none; }
    .acc-chv { font-size:11px;opacity:0.6;transition:transform 0.3s;display:inline-block; }
    .accordion-item[open] .acc-chv { transform:rotate(180deg); }
    .accordion-body { padding:0 16px 14px;border-top:1px solid rgba(255,255,255,0.07); }
    .veh-row { display:flex;justify-content:space-between;padding:5px 0;font-size:12px;gap:8px;border-bottom:1px solid rgba(255,255,255,0.04); }
    .veh-row:last-child { border-bottom:none; }
    .veh-row .lbl { color:rgba(255,255,255,0.5);flex-shrink:0; }
    .veh-row .val { color:rgba(255,255,255,0.9);font-weight:500;text-align:right; }

    /* SIMIT result */
    .simit-resumen { display:flex;flex-wrap:wrap;gap:8px;padding:10px 0 12px;border-bottom:1px solid rgba(255,255,255,0.07);margin-bottom:10px; }
    .simit-stat { background:rgba(255,255,255,0.06);border-radius:8px;padding:6px 14px;font-size:11px;text-align:center; }
    .simit-stat .s-num { color:#fff;font-size:16px;font-weight:700;display:block; }
    .simit-stat .s-lbl { color:rgba(255,255,255,0.45);font-size:10px;text-transform:uppercase;letter-spacing:.5px; }
    .simit-nombre { font-size:12px;color:rgba(255,255,255,0.55);padding:4px 0 10px;text-align:left; }
    .simit-body { margin-top:14px;text-align:left; }

    /* Comparendos table */
    .cmp-wrap { overflow-x:auto; }
    .cmp-table { width:100%;border-collapse:collapse;font-size:11px;min-width:500px; }
    .cmp-table th { color:rgba(255,255,255,0.4);font-weight:600;padding:6px;border-bottom:1px solid rgba(255,255,255,0.12);text-align:left;text-transform:uppercase;font-size:10px;white-space:nowrap; }
    .cmp-table td { color:rgba(255,255,255,0.85);padding:8px 6px;border-bottom:1px solid rgba(255,255,255,0.05);vertical-align:top; }
    .cmp-table tr:last-child td { border-bottom:none; }
    .cmp-num  { font-size:10px;color:rgba(255,255,255,0.4); }
    .cmp-date { font-size:10px;color:rgba(255,255,255,0.4);margin-top:2px; }

    .badge { display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600; }
    .badge-green  { background:rgba(72,187,120,0.15);color:#68d391; }
    .badge-red    { background:rgba(245,101,101,0.15);color:#fc8181; }
    .badge-yellow { background:rgba(237,137,54,0.15);color:#f6ad55; }
    .badge-gray   { background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5); }

    .empty-msg { color:rgba(255,255,255,0.4);font-size:13px;padding:14px 0;text-align:center; }

    .btn-retry { margin-top:16px;padding:10px 20px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:10px;color:#fff;font-size:13px;cursor:pointer;transition:all 0.3s; }
    .btn-retry:hover { background:rgba(255,255,255,0.15); }

    .hidden { display:none; }
    .particles { position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:-1; }
    .particle  { position:absolute;width:4px;height:4px;background:rgba(102,126,234,0.3);border-radius:50%;animation:float linear infinite; }
    @keyframes float{0%{transform:translateY(100vh);opacity:0;}10%{opacity:1;}90%{opacity:1;}100%{transform:translateY(-100px);opacity:0;}}
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="container">
    <div class="card">
      <div class="card-header">
        <div class="icon">🔍</div>
        <h1>Consultas Colombia</h1>
        <p>Antecedentes · Vehículo · Comparendos</p>
      </div>

      <div id="form-section">
        <div class="tabs">
          <div class="tab active" id="tab-antecedentes" onclick="switchTab('antecedentes')">📋 Antecedentes</div>
          <div class="tab"        id="tab-vehiculo"     onclick="switchTab('vehiculo')">🚗 Vehículo</div>
          <div class="tab"        id="tab-simit"        onclick="switchTab('simit')">⚖️ Comparendos</div>
        </div>

        <!-- Antecedentes -->
        <div id="form-antecedentes">
          <div class="input-group">
            <label>Número de Cédula</label>
            <input type="text" id="doc-antecedentes" placeholder="Ingresa tu número de documento" inputmode="numeric">
          </div>
        </div>

        <!-- Vehículo -->
        <div id="form-vehiculo" class="hidden">
          <div class="input-group">
            <label>Número de Placa</label>
            <input type="text" id="placa-vehiculo" placeholder="Ej: ABC123" style="text-transform:uppercase">
          </div>
          <div class="input-group">
            <label>Número de Documento del Propietario</label>
            <input type="text" id="doc-vehiculo" placeholder="Número de cédula" inputmode="numeric">
          </div>
        </div>

        <!-- SIMIT -->
        <div id="form-simit" class="hidden">
          <div class="input-group">
            <label>Número de documento o placa del vehículo</label>
            <input type="text" id="busqueda-simit" placeholder="Cédula o placa (ej: 1002491594 o ABC123)" style="text-transform:uppercase">
          </div>
        </div>

        <button class="btn" id="btn-consultar" onclick="consultar()">Consultar</button>
      </div>

      <div class="progress-section" id="progress-section">
        <div class="progress-bar-container"><div class="progress-bar" id="progress-bar"></div></div>
        <ul class="steps" id="steps-list"></ul>
      </div>

      <div class="result-section" id="result-section">
        <div class="result-card" id="result-card">
          <div class="result-icon"  id="result-icon"></div>
          <div class="result-title" id="result-title"></div>
          <div class="result-msg"   id="result-msg"></div>
          <div id="result-body"></div>
        </div>
        <div style="text-align:center"><button class="btn-retry" onclick="resetForm()">Hacer otra consulta</button></div>
      </div>
    </div>
  </div>

  <script>
    // Particles
    (function(){
      const c = document.getElementById('particles');
      for (let i = 0; i < 15; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random()*100+'%';
        p.style.animationDuration = (Math.random()*10+10)+'s';
        p.style.animationDelay    = (Math.random()*10)+'s';
        c.appendChild(p);
      }
    })();

    let currentTab   = 'antecedentes';
    let stepInterval = null;

    const stepsConfig = {
      antecedentes: [
        {icon:'🌐', text:'Conectando con el sistema...'},
        {icon:'📋', text:'Aceptando condiciones...'},
        {icon:'📝', text:'Enviando documento...'},
        {icon:'🔐', text:'Verificando seguridad...'},
        {icon:'📄', text:'Obteniendo resultado...'},
      ],
      vehiculo: [
        {icon:'🌐', text:'Conectando con el RUNT...'},
        {icon:'📝', text:'Enviando datos del vehículo...'},
        {icon:'🔐', text:'Resolviendo verificación...'},
        {icon:'📄', text:'Obteniendo información...'},
      ],
      simit: [
        {icon:'🌐', text:'Conectando con SIMIT...'},
        {icon:'🔍', text:'Buscando en el registro...'},
        {icon:'📋', text:'Extrayendo comparendos...'},
        {icon:'📄', text:'Procesando resultados...'},
      ],
    };

    function switchTab(tab) {
      currentTab = tab;
      ['antecedentes','vehiculo','simit'].forEach(t => {
        document.getElementById('tab-'+t).classList.toggle('active', t===tab);
        document.getElementById('form-'+t).classList.toggle('hidden', t!==tab);
      });
    }

    // Input filters
    document.getElementById('doc-antecedentes').addEventListener('input', function(){ this.value = this.value.replace(/[^0-9]/g,''); });
    document.getElementById('doc-vehiculo').addEventListener('input',     function(){ this.value = this.value.replace(/[^0-9]/g,''); });
    document.getElementById('placa-vehiculo').addEventListener('input',   function(){ this.value = this.value.replace(/[^a-zA-Z0-9]/g,'').toUpperCase(); });
    document.getElementById('busqueda-simit').addEventListener('input',   function(){ this.value = this.value.replace(/[^a-zA-Z0-9]/g,'').toUpperCase(); });
    document.querySelectorAll('input').forEach(inp => inp.addEventListener('keypress', e => { if (e.key==='Enter') consultar(); }));

    // ── Main action ─────────────────────────────────────────────

    function consultar() {
      const headers    = {'Content-Type':'application/json'};
      const controller = new AbortController();
      const timeoutId  = setTimeout(() => controller.abort(), 180000);

      // Validate
      let url, body;
      if (currentTab === 'antecedentes') {
        const doc = document.getElementById('doc-antecedentes').value.trim();
        if (!doc || doc.length < 5) { shakeInput('doc-antecedentes'); return; }
        url  = '/consultar';
        body = { documento: doc };

      } else if (currentTab === 'vehiculo') {
        const placa = document.getElementById('placa-vehiculo').value.trim();
        const doc   = document.getElementById('doc-vehiculo').value.trim();
        if (!placa || placa.length < 5) { shakeInput('placa-vehiculo'); return; }
        if (!doc   || doc.length   < 5) { shakeInput('doc-vehiculo');   return; }
        url  = '/consultar-vehiculo';
        body = { placa, documento: doc };

      } else {
        const busqueda = document.getElementById('busqueda-simit').value.trim();
        if (!busqueda || busqueda.length < 3) { shakeInput('busqueda-simit'); return; }
        url  = '/consultar-simit';
        body = { busqueda };
      }

      // Show progress
      document.getElementById('form-section').style.display = 'none';
      document.getElementById('result-section').classList.remove('active');
      document.getElementById('progress-section').classList.add('active');
      document.getElementById('btn-consultar').disabled = true;
      buildSteps();
      startStepAnimation();

      fetch(url, { method:'POST', headers, body: JSON.stringify(body), signal: controller.signal })
        .then(r  => { clearTimeout(timeoutId); return r.json(); })
        .then(data => { completeAllSteps(); setTimeout(() => showResult(data), 600); })
        .catch(err => {
          clearTimeout(timeoutId);
          completeAllSteps();
          const msg = err.name==='AbortError' ? 'La consulta tardó demasiado.' : 'No se pudo conectar con el servidor.';
          setTimeout(() => showResult({ success:false, error:msg }), 600);
        });
    }

    // ── Progress helpers ─────────────────────────────────────────

    function buildSteps() {
      const list = document.getElementById('steps-list');
      list.innerHTML = '';
      stepsConfig[currentTab].forEach((s, i) => {
        const li = document.createElement('li');
        li.className = 'step';
        li.id = 'step-'+i;
        li.innerHTML = `<div class="step-icon">${s.icon}</div><span class="step-text">${s.text}</span>`;
        list.appendChild(li);
      });
    }

    function startStepAnimation() {
      const steps = document.querySelectorAll('.step');
      const bar   = document.getElementById('progress-bar');
      bar.style.width = '0%';
      let idx = 0;
      steps[0].classList.add('active');
      stepInterval = setInterval(() => {
        if (idx < steps.length - 1) {
          steps[idx].classList.remove('active');
          steps[idx].classList.add('completed');
          steps[idx].querySelector('.step-icon').textContent = '✓';
          idx++;
          steps[idx].classList.add('active');
          bar.style.width = ((idx+1)/steps.length*100)+'%';
        }
      }, 6000);
    }

    function completeAllSteps() {
      clearInterval(stepInterval);
      document.querySelectorAll('.step').forEach(s => {
        s.classList.remove('active');
        s.classList.add('completed');
        s.querySelector('.step-icon').textContent = '✓';
      });
      document.getElementById('progress-bar').style.width = '100%';
    }

    // ── Result renderer ──────────────────────────────────────────

    function showResult(data) {
      document.getElementById('progress-section').classList.remove('active');
      document.getElementById('result-section').classList.add('active');

      if (!data.success) {
        setCard('error', '⚠️', 'No se pudo completar', data.error || 'Error inesperado.', '');
        return;
      }

      if (currentTab === 'antecedentes') renderAntecedentes(data);
      else if (currentTab === 'vehiculo') renderVehiculo(data);
      else renderSimit(data);
    }

    function setCard(type, icon, title, msg, body) {
      document.getElementById('result-card').className = 'result-card ' + type;
      document.getElementById('result-icon').textContent  = icon;
      document.getElementById('result-title').textContent = title;
      document.getElementById('result-msg').textContent   = msg;
      document.getElementById('result-body').innerHTML    = body;
    }

    // Antecedentes
    function renderAntecedentes(d) {
      const type  = d.tieneAntecedentes ? 'danger'  : 'success';
      const icon  = d.tieneAntecedentes ? '⛔' : '✅';
      const title = d.tieneAntecedentes ? 'Tiene asuntos pendientes' : 'Sin antecedentes';
      let body = '<div class="detail-list">';
      if (d.nombre)       body += drow('Nombre',    d.nombre);
      if (d.documento)    body += drow('Documento', d.documento);
      if (d.horaConsulta) body += drow('Hora',      d.horaConsulta);
      if (d.fechaConsulta) body += drow('Fecha',    new Date(d.fechaConsulta).toLocaleDateString('es-CO'));
      body += '</div>';
      setCard(type, icon, title, d.mensaje, body);
    }

    // Vehículo
    function renderVehiculo(d) {
      const placa = d.vehiculo?.placa || d.placa || '';
      const fields = d.vehiculo ? [
        ['Placa',             d.vehiculo.placa],
        ['Licencia Tránsito', d.vehiculo.nroLicenciaTransito],
        ['Estado',            d.vehiculo.estadoVehiculo],
        ['Servicio',          d.vehiculo.tipoServicio],
        ['Clase',             d.vehiculo.claseVehiculo],
        ['Marca',             d.vehiculo.marca],
        ['Línea',             d.vehiculo.linea],
        ['Modelo',            d.vehiculo.modelo],
        ['Color',             d.vehiculo.color],
        ['Motor',             d.vehiculo.numeroMotor],
        ['Chasis',            d.vehiculo.numeroChasis],
        ['VIN',               d.vehiculo.numeroVIN],
        ['Cilindraje',        d.vehiculo.cilindraje],
        ['Carrocería',        d.vehiculo.tipoCarroceria],
        ['Combustible',       d.vehiculo.tipoCombustible],
        ['Matrícula',         d.vehiculo.fechaMatriculaInicial],
        ['Autoridad',         d.vehiculo.autoridadTransito],
        ['Gravámenes',        d.vehiculo.gravamenesPropiedad],
      ].filter(([,v])=>v) : [];

      const rows = fields.map(([l,v]) =>
        `<div class="veh-row"><span class="lbl">${esc(l)}</span><span class="val">${esc(v)}</span></div>`
      ).join('');

      const body = `
        <div class="accordion">
          <details class="accordion-item" open>
            <summary>🚗 Datos del Vehículo <span class="acc-chv">▼</span></summary>
            <div class="accordion-body">
              ${rows || '<div class="empty-msg">Sin datos disponibles</div>'}
            </div>
          </details>
        </div>`;

      setCard('success', '🚗', 'Información del Vehículo', `Placa: ${esc(placa)}`, body);
    }

    // SIMIT
    function renderSimit(d) {
      const total = d.totalComparendos || 0;
      const icon  = total === 0 ? '✅' : '⚖️';
      const type  = total === 0 ? 'success' : 'danger';
      const title = total === 0 ? 'Sin comparendos' : `${total} comparendo${total!==1?'s':''} encontrado${total!==1?'s':''}`;
      const msg   = d.busqueda || '';

      let body = '<div class="simit-body">';

      // Resumen
      if (d.resumen) {
        const r = d.resumen;
        body += `<div class="simit-resumen">
          <div class="simit-stat"><span class="s-num">${r.comparendosCount}</span><span class="s-lbl">Comparendos</span></div>
          <div class="simit-stat"><span class="s-num">${r.multasCount}</span><span class="s-lbl">Multas</span></div>
          <div class="simit-stat"><span class="s-num">${r.acuerdosPago}</span><span class="s-lbl">Acuerdos</span></div>
          ${r.total ? `<div class="simit-stat"><span class="s-num" style="font-size:13px">${esc(r.total)}</span><span class="s-lbl">Total</span></div>` : ''}
        </div>`;
        if (r.nombre) body += `<div class="simit-nombre">${esc(r.nombre)}</div>`;
      }

      if (total === 0) {
        body += `<div class="empty-msg">No se encontraron comparendos ni multas registradas.</div>`;
      } else {
        body += buildComparendosTable(d.comparendos);
      }

      body += '</div>';
      setCard(type, icon, title, msg, body);
    }

    function buildComparendosTable(comparendos) {
      const rows = comparendos.map(c => `
        <tr>
          <td>
            ${c.numero ? `<div class="cmp-num">${esc(c.numero)}</div>` : ''}
            <strong>${esc(c.tipo)}</strong>
            ${c.fechaImposicion ? `<div class="cmp-date">Imp: ${esc(c.fechaImposicion)}</div>` : ''}
          </td>
          <td>${esc(c.notificacion)}</td>
          <td><strong>${esc(c.placa)}</strong></td>
          <td>${esc(c.secretaria)}</td>
          <td>${esc(c.infraccion)}</td>
          <td><span class="badge ${estadoBadge(c.estado)}">${esc(c.estado)}</span></td>
          <td style="white-space:nowrap;text-align:right"><strong>${esc(c.valorAPagar)}</strong></td>
        </tr>`).join('');

      return `<div class="cmp-wrap">
        <table class="cmp-table">
          <thead><tr>
            <th>Tipo</th><th>Notificación</th><th>Placa</th>
            <th>Secretaría</th><th>Infracción</th><th>Estado</th><th>Valor a pagar</th>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    }

    function estadoBadge(estado) {
      const e = (estado||'').toLowerCase();
      if (e.includes('paz') || e.includes('cancelad') || e.includes('pag')) return 'badge-green';
      if (e.includes('pendiente') || e.includes('vigente') || e.includes('activ'))  return 'badge-red';
      if (e.includes('acuerdo') || e.includes('proceso') || e.includes('cuota'))    return 'badge-yellow';
      return 'badge-gray';
    }

    function drow(label, value) {
      return `<div class="d-row"><span class="lbl">${esc(label)}</span><span class="val">${esc(value)}</span></div>`;
    }

    function esc(str) {
      return (str||'').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function resetForm() {
      document.getElementById('form-section').style.display  = 'block';
      document.getElementById('result-section').classList.remove('active');
      document.getElementById('progress-section').classList.remove('active');
      document.getElementById('btn-consultar').disabled = false;
    }

    function shakeInput(id) {
      const el = document.getElementById(id);
      el.style.animation = 'none'; el.offsetHeight;
      el.style.animation = 'shake 0.5s ease';
      el.style.borderColor = '#f56565';
      setTimeout(() => { el.style.borderColor=''; el.style.animation=''; }, 1000);
    }

    const s = document.createElement('style');
    s.textContent = '@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}';
    document.head.appendChild(s);
  </script>
</body>
</html>
