<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Consultas Colombia</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container { width: 100%; max-width: 520px; }
    .card {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 40px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.3);
      animation: fadeInUp 0.6s ease;
    }
    @keyframes fadeInUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
    .card-header { text-align: center; margin-bottom: 28px; }
    .card-header .icon { width:64px; height:64px; background:linear-gradient(135deg,#667eea,#764ba2); border-radius:16px; display:flex; align-items:center; justify-content:center; margin:0 auto 16px; font-size:28px; }
    .card-header h1 { color:#fff; font-size:20px; font-weight:600; }
    .card-header p { color:rgba(255,255,255,0.5); font-size:13px; margin-top:4px; }

    /* Tabs */
    .tabs { display:flex; gap:8px; margin-bottom:24px; }
    .tab {
      flex:1; padding:12px; border-radius:12px; border:1px solid rgba(255,255,255,0.15);
      background:rgba(255,255,255,0.05); color:rgba(255,255,255,0.6); text-align:center;
      cursor:pointer; transition:all 0.3s; font-size:13px; font-weight:500;
    }
    .tab:hover { background:rgba(255,255,255,0.1); }
    .tab.active { background:linear-gradient(135deg,#667eea,#764ba2); color:#fff; border-color:transparent; }

    .input-group { position:relative; margin-bottom:16px; }
    .input-group label { display:block; color:rgba(255,255,255,0.7); font-size:12px; margin-bottom:6px; font-weight:500; }
    .input-group input {
      width:100%; padding:14px 16px; background:rgba(255,255,255,0.08);
      border:1px solid rgba(255,255,255,0.15); border-radius:10px;
      color:#fff; font-size:15px; transition:all 0.3s; outline:none;
    }
    .input-group input:focus { border-color:#667eea; background:rgba(255,255,255,0.12); box-shadow:0 0 0 3px rgba(102,126,234,0.2); }
    .input-group input::placeholder { color:rgba(255,255,255,0.3); }

    .btn {
      width:100%; padding:14px; background:linear-gradient(135deg,#667eea,#764ba2);
      border:none; border-radius:12px; color:#fff; font-size:15px; font-weight:600;
      cursor:pointer; transition:all 0.3s; margin-top:8px;
    }
    .btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 10px 30px rgba(102,126,234,0.4); }
    .btn:disabled { opacity:0.6; cursor:not-allowed; }

    .progress-section { display:none; margin-top:28px; }
    .progress-section.active { display:block; animation:fadeInUp 0.4s ease; }
    .progress-bar-container { width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:4px; margin-bottom:20px; overflow:hidden; }
    .progress-bar { height:100%; background:linear-gradient(90deg,#667eea,#764ba2,#667eea); background-size:200% 100%; border-radius:4px; width:0%; transition:width 0.8s ease; animation:shimmer 2s infinite linear; }
    @keyframes shimmer { 0%{background-position:-200% 0;} 100%{background-position:200% 0;} }

    .steps { list-style:none; }
    .step { display:flex; align-items:center; gap:10px; padding:8px 0; opacity:0.3; transition:all 0.4s; }
    .step.active { opacity:1; }
    .step.completed { opacity:0.6; }
    .step-icon { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:12px; flex-shrink:0; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); transition:all 0.4s; }
    .step.active .step-icon { background:rgba(102,126,234,0.3); border-color:#667eea; animation:pulse 1.5s infinite; }
    .step.completed .step-icon { background:rgba(72,187,120,0.3); border-color:#48bb78; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 0 0 rgba(102,126,234,0.4);} 50%{box-shadow:0 0 0 6px rgba(102,126,234,0);} }
    .step-text { color:rgba(255,255,255,0.7); font-size:13px; }
    .step.active .step-text { color:#fff; font-weight:500; }

    .result-section { display:none; margin-top:28px; }
    .result-section.active { display:block; animation:fadeInUp 0.5s ease; }
    .result-card { padding:20px; border-radius:16px; text-align:center; }
    .result-card.success { background:rgba(72,187,120,0.1); border:1px solid rgba(72,187,120,0.3); }
    .result-card.danger { background:rgba(245,101,101,0.1); border:1px solid rgba(245,101,101,0.3); }
    .result-card.error { background:rgba(237,137,54,0.1); border:1px solid rgba(237,137,54,0.3); }
    .result-icon { font-size:40px; margin-bottom:10px; animation:bounceIn 0.6s ease; }
    @keyframes bounceIn { 0%{transform:scale(0);} 50%{transform:scale(1.2);} 100%{transform:scale(1);} }
    .result-title { color:#fff; font-size:16px; font-weight:600; margin-bottom:6px; }
    .result-message { color:rgba(255,255,255,0.7); font-size:13px; line-height:1.5; }
    .result-details { margin-top:14px; padding-top:14px; border-top:1px solid rgba(255,255,255,0.1); text-align:left; max-height:300px; overflow-y:auto; }
    .result-detail-item { display:flex; justify-content:space-between; padding:5px 0; font-size:12px; gap:8px; }
    .result-detail-item .label { color:rgba(255,255,255,0.5); flex-shrink:0; }
    .result-detail-item .value { color:rgba(255,255,255,0.9); font-weight:500; text-align:right; }
    .btn-retry { margin-top:16px; padding:10px 20px; background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.2); border-radius:10px; color:#fff; font-size:13px; cursor:pointer; transition:all 0.3s; }
    .btn-retry:hover { background:rgba(255,255,255,0.15); }

    .hidden { display:none; }
    .particles { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:hidden; z-index:-1; }
    .particle { position:absolute; width:4px; height:4px; background:rgba(102,126,234,0.3); border-radius:50%; animation:float linear infinite; }
    @keyframes float { 0%{transform:translateY(100vh);opacity:0;} 10%{opacity:1;} 90%{opacity:1;} 100%{transform:translateY(-100px);opacity:0;} }
  </style>
</head>
<body>
  <div class="particles" id="particles"></div>
  <div class="container">
    <div class="card">
      <div class="card-header">
        <div class="icon">🔍</div>
        <h1>Consultas Colombia</h1>
        <p>Antecedentes y Datos de Vehículo</p>
      </div>

      <div id="form-section">
        <div class="tabs">
          <div class="tab active" id="tab-antecedentes" onclick="switchTab('antecedentes')">📋 Antecedentes</div>
          <div class="tab" id="tab-vehiculo" onclick="switchTab('vehiculo')">🚗 Vehículo</div>
        </div>

        <!-- Form Antecedentes -->
        <div id="form-antecedentes">
          <div class="input-group">
            <label>Número de Cédula</label>
            <input type="text" id="doc-antecedentes" placeholder="Ingresa tu número de documento" inputmode="numeric">
          </div>
        </div>

        <!-- Form Vehiculo -->
        <div id="form-vehiculo" class="hidden">
          <div class="input-group">
            <label>Número de Placa</label>
            <input type="text" id="placa-vehiculo" placeholder="Ej: ABC123" style="text-transform:uppercase">
          </div>
          <div class="input-group">
            <label>Número de Documento del Propietario</label>
            <input type="text" id="doc-vehiculo" placeholder="Número de cédula" inputmode="numeric">
          </div>
        </div>

        <button class="btn" id="btn-consultar" onclick="consultar()">Consultar</button>
      </div>

      <div class="progress-section" id="progress-section">
        <div class="progress-bar-container"><div class="progress-bar" id="progress-bar"></div></div>
        <ul class="steps" id="steps-list"></ul>
      </div>

      <div class="result-section" id="result-section">
        <div class="result-card" id="result-card">
          <div class="result-icon" id="result-icon"></div>
          <div class="result-title" id="result-title"></div>
          <div class="result-message" id="result-message"></div>
          <div class="result-details" id="result-details"></div>
        </div>
        <div style="text-align:center"><button class="btn-retry" onclick="resetForm()">Hacer otra consulta</button></div>
      </div>
    </div>
  </div>

  <script>
    // Particles
    (function(){const c=document.getElementById('particles');for(let i=0;i<15;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.animationDuration=(Math.random()*10+10)+'s';p.style.animationDelay=(Math.random()*10)+'s';c.appendChild(p);}})();

    let currentTab = 'antecedentes';
    let stepInterval = null;

    const stepsConfig = {
      antecedentes: [
        {icon:'🌐', text:'Conectando con el sistema...'},
        {icon:'📋', text:'Aceptando condiciones...'},
        {icon:'📝', text:'Enviando documento...'},
        {icon:'🔐', text:'Verificando seguridad...'},
        {icon:'📄', text:'Obteniendo resultado...'},
      ],
      vehiculo: [
        {icon:'🌐', text:'Conectando con el RUNT...'},
        {icon:'📝', text:'Enviando datos del vehículo...'},
        {icon:'🔐', text:'Resolviendo verificación...'},
        {icon:'📄', text:'Consultando información...'},
      ]
    };

    function switchTab(tab) {
      currentTab = tab;
      document.getElementById('tab-antecedentes').classList.toggle('active', tab==='antecedentes');
      document.getElementById('tab-vehiculo').classList.toggle('active', tab==='vehiculo');
      document.getElementById('form-antecedentes').classList.toggle('hidden', tab!=='antecedentes');
      document.getElementById('form-vehiculo').classList.toggle('hidden', tab!=='vehiculo');
    }

    // Input filters
    document.getElementById('doc-antecedentes').addEventListener('input', function(){this.value=this.value.replace(/[^0-9]/g,'');});
    document.getElementById('doc-vehiculo').addEventListener('input', function(){this.value=this.value.replace(/[^0-9]/g,'');});
    document.getElementById('placa-vehiculo').addEventListener('input', function(){this.value=this.value.replace(/[^a-zA-Z0-9]/g,'').toUpperCase();});

    // Enter key
    document.querySelectorAll('input').forEach(inp => inp.addEventListener('keypress', e => { if(e.key==='Enter') consultar(); }));

    function consultar() {
      let url, body;

      if (currentTab === 'antecedentes') {
        const doc = document.getElementById('doc-antecedentes').value.trim();
        if (!doc || doc.length < 5) { shakeInput('doc-antecedentes'); return; }
        url = '/consultar';
        body = { documento: doc };
      } else {
        const placa = document.getElementById('placa-vehiculo').value.trim();
        const doc = document.getElementById('doc-vehiculo').value.trim();
        if (!placa || placa.length < 5) { shakeInput('placa-vehiculo'); return; }
        if (!doc || doc.length < 5) { shakeInput('doc-vehiculo'); return; }
        url = '/consultar-vehiculo';
        body = { placa, documento: doc };
      }

      document.getElementById('form-section').style.display = 'none';
      document.getElementById('result-section').classList.remove('active');
      document.getElementById('progress-section').classList.add('active');
      document.getElementById('btn-consultar').disabled = true;

      buildSteps();
      startStepAnimation();

      const controller = new AbortController();
      const timeoutId = setTimeout(() => controller.abort(), 180000);

      fetch(url, {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify(body),
        signal: controller.signal
      })
      .then(r => { clearTimeout(timeoutId); return r.json(); })
      .then(data => { completeAllSteps(); setTimeout(() => showResult(data), 600); })
      .catch(err => {
        clearTimeout(timeoutId);
        completeAllSteps();
        const msg = err.name==='AbortError' ? 'La consulta tardó demasiado.' : 'No se pudo conectar con el servidor.';
        setTimeout(() => showResult({success:false, error:msg}), 600);
      });
    }

    function buildSteps() {
      const list = document.getElementById('steps-list');
      list.innerHTML = '';
      stepsConfig[currentTab].forEach((s,i) => {
        const li = document.createElement('li');
        li.className = 'step';
        li.id = 'step-'+i;
        li.innerHTML = `<div class="step-icon">${s.icon}</div><span class="step-text">${s.text}</span>`;
        list.appendChild(li);
      });
    }

    function startStepAnimation() {
      const steps = document.querySelectorAll('.step');
      const bar = document.getElementById('progress-bar');
      bar.style.width = '0%';
      let idx = 0;
      steps[0].classList.add('active');
      stepInterval = setInterval(() => {
        if (idx < steps.length - 1) {
          steps[idx].classList.remove('active');
          steps[idx].classList.add('completed');
          steps[idx].querySelector('.step-icon').textContent = '✓';
          idx++;
          steps[idx].classList.add('active');
          bar.style.width = ((idx+1)/steps.length*100)+'%';
        }
      }, 5000);
    }

    function completeAllSteps() {
      clearInterval(stepInterval);
      document.querySelectorAll('.step').forEach(s => {
        s.classList.remove('active');
        s.classList.add('completed');
        s.querySelector('.step-icon').textContent = '✓';
      });
      document.getElementById('progress-bar').style.width = '100%';
    }

    function showResult(data) {
      document.getElementById('progress-section').classList.remove('active');
      document.getElementById('result-section').classList.add('active');

      const card = document.getElementById('result-card');
      const icon = document.getElementById('result-icon');
      const title = document.getElementById('result-title');
      const message = document.getElementById('result-message');
      const details = document.getElementById('result-details');

      card.className = 'result-card';

      if (!data.success) {
        card.classList.add('error');
        icon.textContent = '⚠️';
        title.textContent = 'No se pudo completar';
        message.textContent = data.error || 'Error inesperado.';
        details.innerHTML = '';
      } else if (currentTab === 'antecedentes') {
        if (!data.tieneAntecedentes) {
          card.classList.add('success');
          icon.textContent = '✅';
          title.textContent = 'Sin antecedentes';
        } else {
          card.classList.add('danger');
          icon.textContent = '⛔';
          title.textContent = 'Tiene asuntos pendientes';
        }
        message.textContent = data.mensaje;
        details.innerHTML = buildAntecedentesDetails(data);
      } else {
        card.classList.add('success');
        icon.textContent = '🚗';
        title.textContent = 'Información del Vehículo';
        message.textContent = `Placa: ${data.vehiculo?.placa || data.placa}`;
        details.innerHTML = buildVehiculoDetails(data.vehiculo);
      }
    }

    function buildAntecedentesDetails(d) {
      let h = '';
      if (d.nombre) h += row('Nombre', d.nombre);
      if (d.documento) h += row('Documento', d.documento);
      if (d.horaConsulta) h += row('Hora', d.horaConsulta);
      if (d.fechaConsulta) h += row('Fecha', new Date(d.fechaConsulta).toLocaleDateString('es-CO'));
      return h;
    }

    function buildVehiculoDetails(v) {
      if (!v) return '';
      const fields = [
        ['Placa', v.placa], ['Licencia Tránsito', v.nroLicenciaTransito],
        ['Estado', v.estadoVehiculo], ['Servicio', v.tipoServicio],
        ['Clase', v.claseVehiculo], ['Marca', v.marca],
        ['Línea', v.linea], ['Modelo', v.modelo],
        ['Color', v.color], ['Motor', v.numeroMotor],
        ['Chasis', v.numeroChasis], ['VIN', v.numeroVIN],
        ['Cilindraje', v.cilindraje], ['Carrocería', v.tipoCarroceria],
        ['Combustible', v.tipoCombustible], ['Matrícula', v.fechaMatriculaInicial],
        ['Autoridad', v.autoridadTransito], ['Gravámenes', v.gravamenesPropiedad],
      ];
      return fields.filter(([,val]) => val).map(([lbl,val]) => row(lbl,val)).join('');
    }

    function row(label, value) {
      return `<div class="result-detail-item"><span class="label">${label}</span><span class="value">${value}</span></div>`;
    }

    function resetForm() {
      document.getElementById('form-section').style.display = 'block';
      document.getElementById('result-section').classList.remove('active');
      document.getElementById('progress-section').classList.remove('active');
      document.getElementById('btn-consultar').disabled = false;
    }

    function shakeInput(id) {
      const el = document.getElementById(id);
      el.style.animation = 'none'; el.offsetHeight;
      el.style.animation = 'shake 0.5s ease';
      el.style.borderColor = '#f56565';
      setTimeout(() => { el.style.borderColor=''; el.style.animation=''; }, 1000);
    }

    const s=document.createElement('style');
    s.textContent='@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}';
    document.head.appendChild(s);
  </script>
</body>
</html>
